name: pantrylist-prod

services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?set MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?set MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${DATABASE_NAME:-pantrylist}
      MONGO_APP_DATABASE: ${DATABASE_NAME:-pantrylist}
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME:?set MONGO_APP_USERNAME}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:?set MONGO_APP_PASSWORD}
    expose:
      - "27017"
    volumes:
      - mongodb_prod_data:/data/db
      - ./docker/mongodb/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"quit(db.adminCommand({ ping: 1 }).ok ? 0 : 2)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - pantrylist-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_NAME: ${DATABASE_NAME:-pantrylist}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_APP_DATABASE: ${DATABASE_NAME:-pantrylist}
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME:?set MONGO_APP_USERNAME}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:?set MONGO_APP_PASSWORD}
      API_PREFIX: ${API_PREFIX:-api}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:${FRONTEND_PORT:-48674}}
      HELMET_ENABLED: ${HELMET_ENABLED:-true}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      COGNITO_ENABLED: ${COGNITO_ENABLED:-true}
      COGNITO_ISSUER: ${COGNITO_ISSUER:?set COGNITO_ISSUER}
      COGNITO_DOMAIN: ${COGNITO_DOMAIN:?set COGNITO_DOMAIN}
      COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID:?set COGNITO_CLIENT_ID}
      COGNITO_CLIENT_SECRET: ${COGNITO_CLIENT_SECRET:-}
      COGNITO_REDIRECT_URI: ${COGNITO_REDIRECT_URI:?set COGNITO_REDIRECT_URI}
      COGNITO_LOGOUT_REDIRECT_URI: ${COGNITO_LOGOUT_REDIRECT_URI:?set COGNITO_LOGOUT_REDIRECT_URI}
      COGNITO_SCOPES: ${COGNITO_SCOPES:-openid email profile}
      COGNITO_ALLOWED_PROVIDERS: ${COGNITO_ALLOWED_PROVIDERS:-Google,Facebook,COGNITO}
      COGNITO_AUTH_TRANSACTION_TTL_SECONDS: ${COGNITO_AUTH_TRANSACTION_TTL_SECONDS:-300}
      AUTH_ACCESS_COOKIE_TTL_SECONDS: ${AUTH_ACCESS_COOKIE_TTL_SECONDS:-900}
      AUTH_REFRESH_COOKIE_TTL_SECONDS: ${AUTH_REFRESH_COOKIE_TTL_SECONDS:-2592000}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      AUTH_COOKIE_SAME_SITE: ${AUTH_COOKIE_SAME_SITE:-lax}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
    expose:
      - "3000"
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('node:http');const req=http.get({host:'127.0.0.1',port:process.env.PORT||3000,path:'/api/healthz'},res=>process.exit((res.statusCode??500)<500?0:1));req.on('error',()=>process.exit(1));req.setTimeout(3000,()=>{req.destroy();process.exit(1);});",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - pantrylist-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      PORT: 4000
      BACKEND_URL: ${BACKEND_URL:-http://backend:3000}
    ports:
      - "${FRONTEND_PORT:-48674}:4000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('node:http');const req=http.get({host:'127.0.0.1',port:process.env.PORT||4000,path:'/healthz'},res=>process.exit((res.statusCode??500)<500?0:1));req.on('error',()=>process.exit(1));req.setTimeout(3000,()=>{req.destroy();process.exit(1);});",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - pantrylist-network

volumes:
  mongodb_prod_data:

networks:
  pantrylist-network:
    driver: bridge
