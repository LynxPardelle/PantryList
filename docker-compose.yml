services:
  mongodb:
    image: mongo:7.0
    container_name: pantrylist-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-pantrylist_root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-change-this-root-password}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-pantrylist}
      MONGO_APP_DATABASE: ${MONGO_APP_DATABASE:-pantrylist}
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME:-pantrylist_app}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:-change-this-app-password}
    ports:
      - "127.0.0.1:${PANTRYLIST_MONGO_HOST_PORT:-37917}:27017"
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongodb/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"quit(db.adminCommand({ ping: 1 }).ok ? 0 : 2)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - pantrylist-network

  backend:
    profiles:
      - app
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pantrylist-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DATABASE_NAME: ${DATABASE_NAME:-pantrylist}
      DATABASE_URL: ${DATABASE_URL:-mongodb://${MONGO_APP_USERNAME:-pantrylist_app}:${MONGO_APP_PASSWORD:-change-this-app-password}@mongodb:${MONGO_PORT:-27017}/${MONGO_APP_DATABASE:-pantrylist}?authSource=${MONGO_APP_DATABASE:-pantrylist}}
      MONGO_HOST: ${MONGO_HOST:-mongodb}
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_APP_DATABASE: ${MONGO_APP_DATABASE:-pantrylist}
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME:-pantrylist_app}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:-change-this-app-password}
      API_PREFIX: ${API_PREFIX:-api}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:48673}
      HELMET_ENABLED: ${HELMET_ENABLED:-true}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      COGNITO_ENABLED: ${COGNITO_ENABLED:-false}
      COGNITO_ISSUER: ${COGNITO_ISSUER:-}
      COGNITO_DOMAIN: ${COGNITO_DOMAIN:-}
      COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID:-}
      COGNITO_CLIENT_SECRET: ${COGNITO_CLIENT_SECRET:-}
      COGNITO_REDIRECT_URI: ${COGNITO_REDIRECT_URI:-}
      COGNITO_LOGOUT_REDIRECT_URI: ${COGNITO_LOGOUT_REDIRECT_URI:-}
      COGNITO_SCOPES: ${COGNITO_SCOPES:-openid email profile}
      COGNITO_ALLOWED_PROVIDERS: ${COGNITO_ALLOWED_PROVIDERS:-Google,Facebook,COGNITO}
      COGNITO_AUTH_TRANSACTION_TTL_SECONDS: ${COGNITO_AUTH_TRANSACTION_TTL_SECONDS:-300}
    ports:
      - "127.0.0.1:${PANTRYLIST_BACKEND_HOST_PORT:-39173}:3000"
    user: root
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - pantrylist-network
    command:
      - sh
      - -c
      - rm -rf dist tsconfig.tsbuildinfo && npm ci --include=dev && exec ./node_modules/.bin/nest start --watch

  frontend:
    profiles:
      - app
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pantrylist-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PROXY_TARGET: http://backend:3000
    ports:
      - "127.0.0.1:${PANTRYLIST_FRONTEND_HOST_PORT:-48673}:4200"
    user: root
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - pantrylist-network
    command:
      - sh
      - -c
      - npm ci --include=dev && exec ./node_modules/.bin/ng serve --proxy-config proxy.conf.cjs --host 0.0.0.0 --port 4200

volumes:
  mongodb_data:

networks:
  pantrylist-network:
    driver: bridge
