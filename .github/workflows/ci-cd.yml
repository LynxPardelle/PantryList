name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  privacy-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0

    - name: Require privacy review for sensitive changes
      env:
        PRIVACY_REVIEW_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        PRIVACY_REVIEW_HEAD: ${{ github.sha }}
      run: node tools/require-privacy-review.mjs --base="$PRIVACY_REVIEW_BASE" --head="$PRIVACY_REVIEW_HEAD"

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GITLEAKS_VERSION: 8.30.1

    steps:
    - uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0

    - name: Install gitleaks
      run: |
        set -euo pipefail
        curl --fail --show-error --silent --location \
          "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
          --output "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
        curl --fail --show-error --silent --location \
          "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" \
          --output gitleaks_checksums.txt
        grep "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" gitleaks_checksums.txt | sha256sum --check -
        tar -xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" gitleaks
        sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

    - name: Scan repository secrets
      run: gitleaks detect --source . --redact --verbose --exit-code 1

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: javascript-typescript

    - name: Autobuild
      uses: github/codeql-action/autobuild@v4

    - name: Analyze
      uses: github/codeql-action/analyze@v4

  test-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
    - uses: actions/checkout@v6.0.2
    
    - name: Setup Node.js
      uses: actions/setup-node@v6.4.0
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      run: npm ci

    - name: Audit runtime dependencies
      run: npm audit --omit=dev --audit-level=moderate

    - name: Run tests
      run: npm run test:ci

    - name: Build application
      run: npm run build

  test-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./backend
    
    steps:
    - uses: actions/checkout@v6.0.2
    
    - name: Setup Node.js
      uses: actions/setup-node@v6.4.0
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    
    - name: Install dependencies
      run: npm ci

    - name: Audit runtime dependencies
      run: npm audit --omit=dev --audit-level=moderate
    
    - name: Run linting
      run: npm run lint:check
    
    - name: Run tests
      run: npm run test
    
    - name: Run e2e tests
      run: npm run test:e2e
    
    - name: Build application
      run: npm run build

  test-infra:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./infra/cognito

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Setup Node.js
      uses: actions/setup-node@v6.4.0
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: infra/cognito/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Audit runtime dependencies
      run: npm audit --omit=dev --audit-level=moderate

    - name: Build infrastructure
      run: npm run build

  container-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6.0.2

    - name: Build backend image
      run: docker build -t despensalista-backend:scan ./backend

    - name: Scan backend image
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: despensalista-backend:scan
        severity: HIGH,CRITICAL
        ignore-unfixed: true
        exit-code: '1'

    - name: Build frontend image
      run: docker build -t despensalista-frontend:scan ./frontend

    - name: Scan frontend image
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: despensalista-frontend:scan
        severity: HIGH,CRITICAL
        ignore-unfixed: true
        exit-code: '1'

  production-smoke:
    needs: [privacy-review, secret-scan, codeql, test-frontend, test-backend, test-infra, container-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.ref == 'refs/heads/main'
    env:
      PRODUCTION_BASE_URL: https://despensalista.lynxpardelle.com
    
    steps:
    - uses: actions/checkout@v6.0.2
    
    - name: Verify production serverless deployment
      run: |
        set -euo pipefail

        for attempt in {1..18}; do
          frontend="$(curl --fail --show-error --silent --connect-timeout 5 --max-time 10 "$PRODUCTION_BASE_URL/healthz" || true)"
          backend="$(curl --fail --show-error --silent --connect-timeout 5 --max-time 10 "$PRODUCTION_BASE_URL/api/healthz" || true)"
          login_html="$(curl --fail --show-error --silent --connect-timeout 5 --max-time 10 "$PRODUCTION_BASE_URL/login/" || true)"
          initial_assets="$(printf '%s' "$login_html" | grep -oE '(main|chunk)-[A-Z0-9]+\.js' | sort -u || true)"
          referenced_assets=""

          for asset in $initial_assets; do
            asset_body="$(curl --fail --show-error --silent --connect-timeout 5 --max-time 10 "$PRODUCTION_BASE_URL/$asset" || true)"
            referenced_assets="$referenced_assets $(printf '%s' "$asset_body" | grep -oE 'chunk-[A-Z0-9]+\.js' | sort -u || true)"
          done

          deployed_marker_found="false"
          all_assets="$(printf '%s\n%s\n' "$initial_assets" "$referenced_assets" | tr ' ' '\n' | sort -u)"
          for asset in $all_assets; do
            asset_body="$(curl --fail --show-error --silent --connect-timeout 5 --max-time 10 "$PRODUCTION_BASE_URL/$asset" || true)"
            if printf '%s' "$asset_body" | grep -q 'Plan y Stripe'; then
              deployed_marker_found="true"
              break
            fi
          done

          if echo "$frontend" | grep -q '"service":"despensalista-frontend"' \
            && echo "$backend" | grep -q '"service":"despensalista-backend"' \
            && [ "$deployed_marker_found" = "true" ]; then
            echo "Production smoke passed."
            exit 0
          fi

          echo "Production is not ready yet (attempt $attempt/18)."
          sleep 10
        done

        echo "::error::Production serverless smoke failed."
        exit 1
