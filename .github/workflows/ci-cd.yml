name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Scan repository secrets
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      run: npm ci

    - name: Audit runtime dependencies
      run: npm audit --omit=dev --audit-level=moderate

    - name: Run tests
      run: npm run test:ci

    - name: Build application
      run: npm run build

  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    
    - name: Install dependencies
      run: npm ci

    - name: Audit dependencies
      run: npm audit --audit-level=moderate
    
    - name: Run linting
      run: npm run lint:check
    
    - name: Run tests
      run: npm run test
    
    - name: Run e2e tests
      run: npm run test:e2e
    
    - name: Build application
      run: npm run build

  test-infra:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/cognito

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: infra/cognito/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Audit dependencies
      run: npm audit --audit-level=moderate

    - name: Build infrastructure
      run: npm run build

  container-scan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build backend image
      run: docker build -t pantrylist-backend:scan ./backend

    - name: Scan backend image
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: pantrylist-backend:scan
        severity: HIGH,CRITICAL
        ignore-unfixed: true
        exit-code: '1'

    - name: Build frontend image
      run: docker build -t pantrylist-frontend:scan ./frontend

    - name: Scan frontend image
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: pantrylist-frontend:scan
        severity: HIGH,CRITICAL
        ignore-unfixed: true
        exit-code: '1'

  production-smoke:
    needs: [secret-scan, test-frontend, test-backend, test-infra, container-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      PRODUCTION_BASE_URL: https://pantrylist.lynxpardelle.com
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Verify production after Dokploy auto deploy
      run: |
        set -euo pipefail

        for attempt in {1..18}; do
          frontend="$(curl --fail --show-error --silent "$PRODUCTION_BASE_URL/healthz" || true)"
          backend="$(curl --fail --show-error --silent "$PRODUCTION_BASE_URL/api/healthz" || true)"
          login_headers="$(curl --fail --show-error --silent --head "$PRODUCTION_BASE_URL/login/" || true)"

          if echo "$frontend" | grep -q '"service":"pantrylist-frontend"' \
            && echo "$backend" | grep -q '"service":"pantrylist-backend"' \
            && echo "$login_headers" | grep -qi '^Cache-Control: no-cache'; then
            echo "Production smoke passed."
            exit 0
          fi

          echo "Production is not ready yet (attempt $attempt/18)."
          sleep 10
        done

        echo "::error::Production smoke failed after waiting for Dokploy auto deploy."
        exit 1
