name: Deploy Serverless Tst

on:
  workflow_dispatch:
  push:
    branches:
      - tst

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Require dev merge
        run: |
          set -euo pipefail
          git fetch origin dev tst
          parent_count="$(git rev-list --parents -n 1 HEAD | awk '{print NF-1}')"
          if [ "$parent_count" -lt 2 ]; then
            echo "Deploying tst requires a merge commit from dev."
            exit 1
          fi
          second_parent="$(git rev-list --parents -n 1 HEAD | awk '{print $3}')"
          git merge-base --is-ancestor "$second_parent" origin/dev

  deploy:
    runs-on: ubuntu-latest
    needs: guard
    environment: tst
    defaults:
      run:
        working-directory: ./infra/cognito

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infra/cognito/package-lock.json

      - run: npm ci
      - run: npm --prefix ../../frontend ci
      - run: npm --prefix ../../frontend run build
      - run: npm run validate:serverless

      - name: Validate deploy inputs
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
          APP_DOMAIN_NAME: ${{ vars.APP_DOMAIN_NAME || 'test.despensalista.lynxpardelle.com' }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          COGNITO_DOMAIN_PREFIX: ${{ vars.COGNITO_DOMAIN_PREFIX }}
          FRONTEND_BASE_URL: ${{ vars.FRONTEND_BASE_URL }}
        run: |
          set -euo pipefail
          test -n "$AWS_ROLE_ARN"
          test -n "$APP_DOMAIN_NAME"
          test -n "$AWS_REGION"
          test -n "$COGNITO_DOMAIN_PREFIX"

      - uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Confirm AWS caller identity
        run: aws sts get-caller-identity

      - name: Deploy tst serverless backend
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          APP_DOMAIN_NAME: ${{ vars.APP_DOMAIN_NAME || 'test.despensalista.lynxpardelle.com' }}
          COGNITO_DOMAIN_PREFIX: ${{ vars.COGNITO_DOMAIN_PREFIX }}
          FRONTEND_BASE_URL: ${{ vars.FRONTEND_BASE_URL }}
        run: |
          set -euo pipefail
          FRONTEND_BASE_URL="${FRONTEND_BASE_URL:-https://$APP_DOMAIN_NAME}"
          npx cdk deploy --all --require-approval never \
            --context projectName=despensalista \
            --context stage=tst \
            --context awsRegion="$AWS_REGION" \
            --context includeServerlessBackend=true \
            --context removalPolicy=destroy \
            --context domainPrefix="$COGNITO_DOMAIN_PREFIX" \
            --context appDomainName="$APP_DOMAIN_NAME" \
            --context productionFrontendBaseUrl="$FRONTEND_BASE_URL" \
            --context serverlessFrontendBaseUrl="$FRONTEND_BASE_URL"
