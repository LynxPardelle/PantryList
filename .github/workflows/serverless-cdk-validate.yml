name: Serverless CDK Validate

on:
  pull_request:
    branches:
      - dev
      - tst
      - prod
  push:
    branches:
      - dev
      - tst
      - prod

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/cognito

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infra/cognito/package-lock.json

      - run: npm ci
      - run: npm --prefix ../../frontend ci
      - run: npm --prefix ../../frontend run build
      - run: npm run validate:serverless
